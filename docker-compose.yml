services:
  backend:
    container_name: aprendizaje-backend
    build:
      context: ./backend-aprendisaje-interactivo
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend-aprendisaje-interactivo:/app-node
      - /app-node/node_modules
    env_file:
      - ./backend-aprendisaje-interactivo/.env
    environment:
      - NODE_ENV=development
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    container_name: aprendizaje-frontend
    build:
      context: ./frontend-pagina-aprendisaje-interactivo
      dockerfile: dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-pagina-aprendisaje-interactivo:/app-node
      - /app-node/node_modules
    env_file:
      - ./frontend-pagina-aprendisaje-interactivo/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
